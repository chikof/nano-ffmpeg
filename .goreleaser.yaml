version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./main.go
    binary: nano-ffmpeg
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/dgr8akki/nano-ffmpeg/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^Merge"

brews:
  - repository:
      owner: dgr8akki
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: nano-ffmpeg
    description: "A beautiful terminal UI for ffmpeg"
    homepage: "https://github.com/dgr8akki/nano-ffmpeg"
    license: "MIT"
    dependencies:
      - name: ffmpeg-full
    test: |
      system "#{bin}/nano-ffmpeg", "--version"
    install: |
      bin.install "nano-ffmpeg"

scoops:
  - name: nano-ffmpeg
    repository:
      owner: dgr8akki
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/dgr8akki/nano-ffmpeg"
    description: "A beautiful terminal UI for ffmpeg"
    license: "MIT"
    # Pulls ffmpeg + ffprobe from the official `extras` bucket when the user
    # runs `scoop install nano-ffmpeg`. Users must have that bucket added:
    #   scoop bucket add extras
    depends:
      - extras/ffmpeg
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
